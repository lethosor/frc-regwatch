name: Run

on:
  workflow_call:
    inputs: &inputs
      year:
        required: true
        type: number
        default: 2026
        description: Year (season end)
  workflow_dispatch:
    inputs: *inputs

jobs:
  run:
    strategy:
      matrix:
        client: [tba]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
    - name: Clone
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Set env
      run: |
        echo "REGWATCH_BRANCH=data-${{inputs.year}}-${{matrix.client}}" >> "$GITHUB_ENV"
        echo "${{secrets.TBA_KEY}}" >> .tba.key
        git config user.name regwatch
        git config user.email regwatch
    - name: Set up repo
      run: |
        git pull origin "${REGWATCH_BRANCH}:${REGWATCH_BRANCH}" --rebase
    - name: Install uv
      uses: astral-sh/setup-uv@v6
    - name: Run script
      run: |
        uv run main.py \
          --year ${{inputs.year}} \
          --client ${{matrix.client}} \
          --target-repo-root . \
          --target-repo-branch "${REGWATCH_BRANCH}"
    - name: Push
      run: git push origin "${REGWATCH_BRANCH}"
